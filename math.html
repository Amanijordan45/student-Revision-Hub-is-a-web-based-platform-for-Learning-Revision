<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Revision</title>
    <link rel="stylesheet" href="Math.css">
</head>
<body>

<nav>
    <h1>Student Revision Hub</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="math.html">Math</a></li>
    </ul>
</nav>

<section class="math-container">
    <h2>📐 Mathematics</h2>
    <p>Choose a topic below:</p>

    <div class="topics">
        <div class="card">
            <h3>Algebra</h3>
            <button onclick="openLesson('algebra')">Start Learning</button>
        </div>

        <div class="card">
            <h3>Geometry</h3>
            <button onclick="openLesson('geometry')">Start Learning</button>
        </div>

        <div class="card">
            <h3>Trigonometry</h3>
            <button onclick="openLesson('trigonometry')">Start Learning</button>
        </div>
    </div>

    <div id="lesson-content"></div>

    <!-- Quiz -->
    <div class="quiz">
        <h3>Quick Quiz</h3>
        <p>What is 5 × 6?</p>
        <input type="number" id="quizAnswer">
        <button onclick="checkQuiz()">Submit</button>
        <p id="quizResult"></p>
    </div>

    <!-- Calculator -->
    <div class="calculator">
        <h3>Simple Calculator</h3>
        <input type="number" id="num1" placeholder="Number 1">
        <input type="number" id="num2" placeholder="Number 2">
        <button onclick="calculate()">Add</button>
        <p id="calcResult"></p>
    </div>

    <!-- Progress -->
    <div class="progress">
        <h3>Your Progress</h3>
        <p id="progressStatus"></p>
    </div>

</section>

<script src="math.js">
</script>
s
</body>
</html>
